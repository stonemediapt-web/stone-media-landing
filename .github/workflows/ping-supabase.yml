name: Ping Supabase

on:
  schedule:
    - cron: '0 9 * * 1'  # toda segunda-feira às 9h UTC
  workflow_dispatch:      # permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ping projetos
        run: node ping-supabase.js
